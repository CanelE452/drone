<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAFI Ai 제어</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Roboto, "Noto Sans KR", sans-serif;
         background: #11141a; color: #e6e9ef; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; margin: 8px 0 16px; }
  .panel { background: #1a1f2b; border: 1px solid #2a3142; border-radius: 10px;
           padding: 14px; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .stat { display: flex; justify-content: space-between; padding: 4px 0;
          border-bottom: 1px solid #232a38; font-size: 14px; }
  .stat:last-child { border-bottom: none; }
  .stat b { color: #8fa3c8; font-weight: 500; }
  .val { font-variant-numeric: tabular-nums; }
  .pill { padding: 2px 8px; border-radius: 20px; font-size: 12px; }
  .ok { background: #16361f; color: #5ce08a; }
  .bad { background: #3a1a1a; color: #ff7a7a; }
  .warn { background: #3a3318; color: #ffd24d; }
  button { background: #28324a; color: #e6e9ef;
           border: 1px solid #3a4660; border-radius: 8px; padding: 12px 14px;
           font-size: 15px; cursor: pointer; min-width: 64px; }
  button:hover:not(:disabled) { background: #34416180; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 280px; }
  .pad .empty { visibility: hidden; }
  .seg button { flex: 1; }
  .seg button.active { background: #2f6fed; border-color: #2f6fed; }
  .takeoff { background: #1f6f3a; border-color: #2a8f4d; }
  .land { background: #b54a1a; border-color: #d6692f; }
  .land-now { background: #d63a3a; border-color: #ff5555; font-weight: 700;
              width: 100%; padding: 16px; font-size: 17px; }
  .cutoff { background: #2a1518; border: 1px solid #7a2a2a; color: #ff9a9a;
            font-size: 13px; position: relative; overflow: hidden; }
  .cutoff .fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
                  background: #d63a3a55; transition: width 0.05s linear; }
  .cmp { font-size: 13px; }
  .cmp td { padding: 3px 10px 3px 0; font-variant-numeric: tabular-nums; }
  .cmp .err { color: #ffd24d; }
  .hint { color: #6b7689; font-size: 12px; margin-top: 8px; }
  input[type=number] { width: 80px; background: #11141a; color: #e6e9ef;
                       border: 1px solid #3a4660; border-radius: 6px; padding: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ANAFI Ai 실시간 제어 <span id="ctlMode" class="pill warn">--</span></h1>

  <!-- 상태 -->
  <div class="panel">
    <div class="stat"><b>연결</b><span id="conn" class="pill bad">미연결</span></div>
    <div class="stat"><b>비행 상태</b><span id="fstate" class="val">-</span></div>
    <div class="stat"><b>고도 (실측)</b><span id="alt" class="val">0.00 m</span></div>
    <div class="stat"><b>Yaw</b><span id="yaw" class="val">0°</span></div>
    <div class="stat"><b>배터리</b><span id="batt" class="val">-</span></div>
    <div class="stat"><b>추정 위치 (이륙점 기준)</b><span id="pos" class="val">x0 y0 z0 cm</span></div>
    <div class="stat"><b>큐 / 상태</b><span id="qstate" class="val">-</span></div>
    <div id="errbox" class="hint" style="color:#ff7a7a"></div>
  </div>

  <!-- 명령값 vs 실측값 -->
  <div class="panel">
    <b style="font-size:14px; color:#8fa3c8">마지막 이동 — 명령값 vs 실측값</b>
    <table class="cmp" style="margin-top:8px">
      <tr><td></td><td>전방</td><td>우측</td><td>상승</td><td>yaw</td></tr>
      <tr><td>명령</td><td id="c_f">-</td><td id="c_r">-</td><td id="c_u">-</td><td id="c_y">-</td></tr>
      <tr><td>실측</td><td id="a_f">-</td><td id="a_r">-</td><td id="a_u">-</td><td id="a_y">-</td></tr>
      <tr><td>오차</td><td id="e_f" class="err">-</td><td id="e_r" class="err">-</td><td id="e_u" class="err">-</td><td></td></tr>
    </table>
    <div class="hint">실내(GPS 없음)에선 명령값과 실측값이 ±10~30cm 차이날 수 있다.</div>
  </div>

  <!-- 이륙/착륙 -->
  <div class="panel row">
    <button class="takeoff" onclick="send({cmd:'takeoff'})">이륙</button>
    <button class="land" onclick="send({cmd:'land'})">착륙</button>
  </div>

  <!-- 스텝 크기 -->
  <div class="panel">
    <b style="font-size:14px; color:#8fa3c8">스텝 크기</b>
    <div class="row seg" id="stepSeg" style="margin-top:8px">
      <button data-step="10">10 cm</button>
      <button data-step="30" class="active">30 cm</button>
      <button data-step="50">50 cm</button>
      <button data-step="100">100 cm</button>
    </div>
  </div>

  <!-- 방향 패드 -->
  <div class="panel">
    <div class="row" style="gap:24px; align-items:flex-start">
      <div>
        <div class="hint" style="margin:0 0 6px">수평 / 고도 (W A S D / R F)</div>
        <div class="pad">
          <button class="empty"></button>
          <button onclick="move('forward',1)">전 ▲</button>
          <button onclick="move('up',1)">상 ⤒</button>
          <button onclick="move('right',-1)">◀ 좌</button>
          <button onclick="move('forward',-1)">후 ▼</button>
          <button onclick="move('right',1)">우 ▶</button>
          <button onclick="move('up',-1)">하 ⤓</button>
          <button onclick="move('yaw',-1)">↺ yaw</button>
          <button onclick="move('yaw',1)">yaw ↻</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 고도 설정 / 복귀 -->
  <div class="panel row">
    <label>목표 고도 <input type="number" id="targetAlt" value="1.5" step="0.1" min="0" max="2.5"> m</label>
    <button onclick="send({cmd:'goto_altitude', target_m: parseFloat(document.getElementById('targetAlt').value)})">고도 이동</button>
    <button onclick="send({cmd:'return_home'})">초기 위치 복귀</button>
  </div>

  <!-- 안전 정지 (2단) -->
  <div class="panel">
    <button class="land-now" onclick="send({cmd:'land_now'})">■ 긴급 착륙 (즉시)</button>
    <div style="margin-top:10px">
      <button class="cutoff" id="cutoffBtn">
        <span class="fill" id="cutoffFill"></span>
        <span style="position:relative">모터 컷오프 — 1초 길게 누르기 (공중이면 추락)</span>
      </button>
    </div>
  </div>
</div>

<script>
let step = 30;
let busy = false;
const ws = new WebSocket(`ws://${location.host}/ws`);

ws.onmessage = (ev) => render(JSON.parse(ev.data));
ws.onclose = () => document.getElementById('conn').textContent = 'WS 끊김';

function send(obj) { if (ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function move(axis, dir) {
  const m = { cmd: 'move', forward_cm: 0, right_cm: 0, up_cm: 0, yaw_deg: 0 };
  if (axis === 'yaw') m.yaw_deg = 30 * dir;
  else m[axis + '_cm'] = step * dir;
  send(m);
}

// 스텝 선택
document.getElementById('stepSeg').addEventListener('click', (e) => {
  if (e.target.dataset.step) {
    step = parseInt(e.target.dataset.step);
    document.querySelectorAll('#stepSeg button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
  }
});

// 모터 컷오프: 1초 hold-to-confirm
(() => {
  const btn = document.getElementById('cutoffBtn');
  const fill = document.getElementById('cutoffFill');
  let timer = null, start = 0, raf = null;
  const HOLD = 1000;
  function tick() {
    const p = Math.min((Date.now() - start) / HOLD, 1);
    fill.style.width = (p * 100) + '%';
    if (p < 1) raf = requestAnimationFrame(tick);
  }
  function begin(e) {
    e.preventDefault();
    start = Date.now();
    tick();
    timer = setTimeout(() => { send({ cmd: 'emergency' }); reset(); }, HOLD);
  }
  function reset() { clearTimeout(timer); cancelAnimationFrame(raf); fill.style.width = '0%'; }
  btn.addEventListener('mousedown', begin);
  btn.addEventListener('touchstart', begin);
  btn.addEventListener('mouseup', reset);
  btn.addEventListener('mouseleave', reset);
  btn.addEventListener('touchend', reset);
})();

// 키보드 바인딩
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  const map = { w:['forward',1], s:['forward',-1], a:['right',-1], d:['right',1],
                r:['up',1], f:['up',-1], q:['yaw',-1], e:['yaw',1] };
  if (map[k]) { move(...map[k]); }
  else if (k === ' ') { e.preventDefault(); send({ cmd: 'land_now' }); }
});

function render(d) {
  const t = d.telemetry;
  document.getElementById('ctlMode').textContent = d.controller;
  document.getElementById('ctlMode').className = 'pill ' + (d.controller === 'real' ? 'bad' : 'warn');
  const conn = document.getElementById('conn');
  conn.textContent = t.connected ? '연결됨' : '미연결';
  conn.className = 'pill ' + (t.connected ? 'ok' : 'bad');
  document.getElementById('fstate').textContent = t.flying_state;
  document.getElementById('alt').textContent = t.altitude_m.toFixed(2) + ' m';
  document.getElementById('yaw').textContent = t.yaw_deg.toFixed(0) + '°';
  const batt = document.getElementById('batt');
  batt.textContent = t.battery_pct + ' %';
  batt.className = 'val ' + (t.battery_pct < 20 ? 'pill bad' : '');
  document.getElementById('pos').textContent =
    `x${t.est_x_cm.toFixed(0)} y${t.est_y_cm.toFixed(0)} z${t.est_z_cm.toFixed(0)} cm`;
  document.getElementById('qstate').textContent =
    (d.busy ? '이동 중' : '대기') + ` · 큐 ${d.queued}`;
  document.getElementById('errbox').textContent = d.error || '';

  // 명령 vs 실측
  const c = t.last_cmd || {}, a = t.last_actual || {};
  const set = (id, v) => document.getElementById(id).textContent = (v === undefined ? '-' : v);
  set('c_f', c.forward_cm); set('c_r', c.right_cm); set('c_u', c.up_cm); set('c_y', c.yaw_deg);
  set('a_f', a.forward_cm); set('a_r', a.right_cm); set('a_u', a.up_cm); set('a_y', a.yaw_deg);
  const err = (cmd, act) => (cmd !== undefined && act !== undefined && cmd !== 0)
    ? (act - cmd).toFixed(1) : '-';
  set('e_f', err(c.forward_cm, a.forward_cm));
  set('e_r', err(c.right_cm, a.right_cm));
  set('e_u', err(c.up_cm, a.up_cm));

  // busy 시 이동 버튼 비활성화
  busy = d.busy;
  document.querySelectorAll('.pad button, .takeoff, .land').forEach(b => b.disabled = busy);
}
</script>
</body>
</html>
